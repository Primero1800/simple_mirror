name: CI

on:
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    env:
      DEBUG: 'True'
      SECRET_KEY: 'ci-secret-key-not-for-production'
      OTP_LIFETIME_SECONDS: '60'
      OTP_MAX_ATTEMPTS: '3'
      OTP_RESEND_COOLDOWN_SECONDS: '30'
      LOGIN_MAX_ATTEMPTS: '3'
      EMAIL_MAX_RETRIES: '3'
      EMAIL_RETRY_DELAY: '0.5'
      EMAIL_THREAD_POOL_SIZE: '4'
      EMAIL_TIMEOUT: '5'
      EMAIL_HOST: 'localhost'
      EMAIL_PORT: '25'
      EMAIL_USE_TLS: 'False'
      EMAIL_USE_SSL: 'False'
      EMAIL_HOST_USER: ''
      EMAIL_HOST_PASSWORD: ''
      REDIS_HOST: 'localhost'
      REDIS_PORT: '6379'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Poetry
        run: pip install poetry==2.1.3

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Ruff linting
        run: poetry run ruff check accounts mirror simple_mirror tests

      - name: Ruff formatting
        run: poetry run ruff format --check accounts mirror simple_mirror tests

      - name: Check types with mypy
        run: poetry run mypy accounts mirror simple_mirror

      - name: Run tests
        run: poetry run pytest --cov-report=term-missing:skip-covered --cov=accounts --cov=mirror --cov=simple_mirror tests/
