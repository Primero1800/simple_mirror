<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mirror</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      background-color: #0a0a0a;
      overflow: hidden;
      font-family: sans-serif;
    }

    #app {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100vw;
      height: 100vh;
      gap: 0;
    }

    /* Equalizer panels */
    .eq-panel {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      padding: 0 8px;
    }

    .eq-canvas {
      display: block;
      border-radius: 4px;
    }

    /* Video container */
    #video-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      min-width: 0;
    }

    #webcam {
      display: block;
      width: 100%;
      max-height: 100vh;
      object-fit: cover;
      transform: scaleX(-1);
      border-radius: 4px;
      background: #111;
    }

    /* Error overlay */
    #error-msg {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(10, 10, 10, 0.92);
      color: #ff4444;
      font-size: 1.2rem;
      text-align: center;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 1rem;
      z-index: 100;
    }

    #error-msg.visible {
      display: flex;
    }

    #error-msg span {
      font-size: 3rem;
    }

    /* Loading overlay */
    #loading {
      position: fixed;
      inset: 0;
      background: #0a0a0a;
      color: #888;
      font-size: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 99;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    #loading.hidden {
      display: none;
    }

    /* Snap flash */
    #snap-flash {
      position: fixed;
      inset: 0;
      background: #fff;
      opacity: 0;
      pointer-events: none;
      z-index: 200;
    }

    #snap-flash.flash {
      animation: do-flash 0.35s ease-out forwards;
    }

    @keyframes do-flash {
      0%   { opacity: 0.65; }
      100% { opacity: 0; }
    }

    /* Controls */
    #controls {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 10px;
      z-index: 50;
    }

    .ctrl-btn {
      background: rgba(15, 15, 15, 0.82);
      border: 1px solid rgba(255, 255, 255, 0.18);
      color: #d0d0d0;
      font-size: 0.9rem;
      letter-spacing: 0.04em;
      padding: 9px 20px;
      border-radius: 999px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      white-space: nowrap;
    }

    .ctrl-btn:hover:not(:disabled) {
      background: rgba(38, 38, 38, 0.92);
      border-color: rgba(255, 255, 255, 0.35);
      color: #fff;
    }

    .ctrl-btn:disabled {
      opacity: 0.28;
      cursor: default;
    }

    .ctrl-divider {
      width: 1px;
      height: 22px;
      background: rgba(255, 255, 255, 0.12);
      flex-shrink: 0;
    }

    #rec-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #ff3333;
      box-shadow: 0 0 7px #ff3333;
      opacity: 0;
      transition: opacity 0.2s;
      flex-shrink: 0;
    }

    #rec-dot.active {
      opacity: 1;
      animation: blink-dot 1s ease-in-out infinite;
    }

    @keyframes blink-dot {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.1; }
    }
  </style>
</head>
<body>

<div id="loading">Requesting permissions&hellip;</div>

<div id="error-msg">
  <span>&#128247;</span>
  <p id="error-text">Camera or microphone access was denied.</p>
  <small>Please allow access in your browser and reload the page.</small>
</div>

<div id="app">
  <div class="eq-panel" id="eq-left-panel">
    <canvas class="eq-canvas" id="eq-left"></canvas>
  </div>

  <div id="video-wrap">
    <video id="webcam" autoplay playsinline muted></video>
  </div>

  <div class="eq-panel" id="eq-right-panel">
    <canvas class="eq-canvas" id="eq-right"></canvas>
  </div>
</div>

<div id="snap-flash"></div>

<div id="controls">
  <button class="ctrl-btn" id="btn-snap">&#128247; Снимок</button>
  <button class="ctrl-btn" id="btn-circle">&#9689; Кружок</button>
  <div class="ctrl-divider"></div>
  <button class="ctrl-btn" id="btn-record">&#9210; Запись</button>
  <span id="rec-dot"></span>
  <button class="ctrl-btn" id="btn-stop" disabled>&#9209; Стоп</button>
</div>

<script>
(function () {
  'use strict';

  var BAR_COUNT    = 16;
  var BAR_GAP      = 4;
  var BAR_WIDTH    = 18;
  var CANVAS_WIDTH = BAR_COUNT * BAR_WIDTH + (BAR_COUNT - 1) * BAR_GAP;

  function getBarColor(ratio) {
    if (ratio < 0.5) {
      var t = ratio / 0.5;
      return 'rgb(' + Math.round(t * 255) + ', 255, 80)';
    } else {
      var t2 = (ratio - 0.5) / 0.5;
      return 'rgb(255, ' + Math.round((1 - t2) * 255) + ', 80)';
    }
  }

  function drawEqualizer(ctx, dataArray, width, height, mirror) {
    ctx.clearRect(0, 0, width, height);

    var step   = Math.floor(dataArray.length / BAR_COUNT);
    var maxVal = 255;

    for (var i = 0; i < BAR_COUNT; i++) {
      var sum = 0;
      for (var j = 0; j < step; j++) {
        sum += dataArray[i * step + j];
      }
      var avg            = sum / step;
      var barHeightRatio = avg / maxVal;
      var barHeight      = Math.max(2, barHeightRatio * height);

      var x;
      if (mirror) {
        x = width - (i + 1) * BAR_WIDTH - i * BAR_GAP;
      } else {
        x = i * (BAR_WIDTH + BAR_GAP);
      }

      var y = height - barHeight;

      ctx.shadowBlur  = 12;
      ctx.shadowColor = getBarColor(barHeightRatio);
      ctx.fillStyle   = getBarColor(barHeightRatio);
      ctx.fillRect(x, y, BAR_WIDTH, barHeight);

      ctx.shadowBlur = 0;
      ctx.fillStyle  = 'rgba(255,255,255,0.04)';
      ctx.fillRect(x, 0, BAR_WIDTH, y);
    }
  }

  function resizeCanvases() {
    var vh = window.innerHeight;
    ['eq-left', 'eq-right'].forEach(function (id) {
      var canvas    = document.getElementById(id);
      canvas.width  = CANVAS_WIDTH;
      canvas.height = vh;
    });
  }

  async function init() {
    resizeCanvases();
    window.addEventListener('resize', resizeCanvases);

    var stream;
    try {
      stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
    } catch (err) {
      document.getElementById('loading').classList.add('hidden');
      var errorMsg  = document.getElementById('error-msg');
      var errorText = document.getElementById('error-text');
      if (err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError') {
        errorText.textContent = 'Camera or microphone access was denied.';
      } else if (err.name === 'NotFoundError') {
        errorText.textContent = 'No camera or microphone found.';
      } else {
        errorText.textContent = 'Could not access media devices: ' + err.message;
      }
      errorMsg.classList.add('visible');
      return;
    }

    var video    = document.getElementById('webcam');
    video.srcObject = stream;

    var audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    var source   = audioCtx.createMediaStreamSource(stream);
    var analyser = audioCtx.createAnalyser();
    analyser.fftSize               = 256;
    analyser.smoothingTimeConstant = 0.8;
    source.connect(analyser);

    var bufferLength = analyser.frequencyBinCount;
    var dataArray    = new Uint8Array(bufferLength);

    var canvasLeft  = document.getElementById('eq-left');
    var canvasRight = document.getElementById('eq-right');
    var ctxLeft     = canvasLeft.getContext('2d');
    var ctxRight    = canvasRight.getContext('2d');

    document.getElementById('loading').classList.add('hidden');

    function animate() {
      requestAnimationFrame(animate);
      analyser.getByteFrequencyData(dataArray);
      drawEqualizer(ctxLeft,  dataArray, canvasLeft.width,  canvasLeft.height,  false);
      drawEqualizer(ctxRight, dataArray, canvasRight.width, canvasRight.height, true);
    }
    animate();

    // ── helpers ──────────────────────────────────────────────────────────────
    var snapFlash = document.getElementById('snap-flash');

    function flash() {
      snapFlash.classList.remove('flash');
      void snapFlash.offsetWidth; // reflow to restart animation
      snapFlash.classList.add('flash');
    }

    function ts() {
      return new Date().toISOString().slice(0, 19).replace(/[:T]/g, '-');
    }

    function downloadCanvas(canvas, filename) {
      canvas.toBlob(function (blob) {
        var url = URL.createObjectURL(blob);
        var a   = document.createElement('a');
        a.href     = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        setTimeout(function () { URL.revokeObjectURL(url); }, 5000);
      }, 'image/png');
    }

    // ── snapshot ─────────────────────────────────────────────────────────────
    document.getElementById('btn-snap').addEventListener('click', function () {
      var w = video.videoWidth;
      var h = video.videoHeight;
      if (!w || !h) { return; }

      var canvas    = document.createElement('canvas');
      canvas.width  = w;
      canvas.height = h;
      var ctx = canvas.getContext('2d');
      ctx.translate(w, 0);
      ctx.scale(-1, 1);
      ctx.drawImage(video, 0, 0, w, h);

      flash();
      downloadCanvas(canvas, 'mirror-snap-' + ts() + '.png');
    });

    // ── circle snapshot ───────────────────────────────────────────────────────
    document.getElementById('btn-circle').addEventListener('click', function () {
      var w = video.videoWidth;
      var h = video.videoHeight;
      if (!w || !h) { return; }

      var size      = Math.min(w, h);
      var canvas    = document.createElement('canvas');
      canvas.width  = size;
      canvas.height = size;
      var ctx = canvas.getContext('2d');

      // Circular clip
      ctx.beginPath();
      ctx.arc(size / 2, size / 2, size / 2, 0, Math.PI * 2);
      ctx.clip();

      // Mirror + brightness boost + centre-crop to square
      ctx.save();
      ctx.filter = 'brightness(1.4) saturate(0.85)';
      ctx.translate(size, 0);
      ctx.scale(-1, 1);
      var sx = (w - size) / 2;
      var sy = (h - size) / 2;
      ctx.drawImage(video, sx, sy, size, size, 0, 0, size, size);
      ctx.restore();

      // Slight white veil for the "softened" look
      ctx.fillStyle = 'rgba(255, 255, 255, 0.14)';
      ctx.fillRect(0, 0, size, size);

      flash();
      downloadCanvas(canvas, 'mirror-circle-' + ts() + '.png');
    });

    // ── recording ─────────────────────────────────────────────────────────────
    var btnRecord = document.getElementById('btn-record');
    var btnStop   = document.getElementById('btn-stop');
    var recDot    = document.getElementById('rec-dot');
    var recorder  = null;
    var chunks    = [];

    btnRecord.addEventListener('click', function () {
      chunks = [];
      var mimeType = ['video/webm;codecs=vp9,opus', 'video/webm', ''].find(function (t) {
        return t === '' || MediaRecorder.isTypeSupported(t);
      });
      recorder = new MediaRecorder(stream, mimeType ? { mimeType: mimeType } : {});

      recorder.ondataavailable = function (e) {
        if (e.data && e.data.size > 0) { chunks.push(e.data); }
      };

      recorder.onstop = function () {
        var blob = new Blob(chunks, { type: recorder.mimeType || 'video/webm' });
        var url  = URL.createObjectURL(blob);
        var a    = document.createElement('a');
        a.href     = url;
        a.download = 'mirror-rec-' + ts() + '.webm';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        setTimeout(function () { URL.revokeObjectURL(url); }, 5000);

        btnRecord.disabled = false;
        btnStop.disabled   = true;
        recDot.classList.remove('active');
      };

      recorder.start(250);
      btnRecord.disabled = true;
      btnStop.disabled   = false;
      recDot.classList.add('active');
    });

    btnStop.addEventListener('click', function () {
      if (recorder && recorder.state === 'recording') {
        recorder.stop();
      }
    });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
}());
</script>

</body>
</html>
