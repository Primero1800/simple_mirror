{% load i18n %}
<!DOCTYPE html>
<html lang="{{ LANGUAGE_CODE }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Mirror{% endblock %}</title>
  <link rel="icon" href="data:,">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height: 100vh;
      background: #0a0a0a;
      color: #d0d0d0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: rgba(18, 18, 18, 0.98);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 14px;
      padding: 42px 38px 36px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.6);
      position: relative;
    }

    .card h1 {
      font-size: 1.35rem;
      font-weight: 500;
      color: #fff;
      letter-spacing: 0.01em;
      margin-bottom: 28px;
    }

    .field { margin-bottom: 16px; }

    .field label {
      display: block;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: #666;
      margin-bottom: 6px;
    }

    .field input[type="email"],
    .field input[type="password"],
    .field input[type="text"] {
      width: 100%;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      color: #e8e8e8;
      font-size: 0.95rem;
      padding: 11px 14px;
      outline: none;
      transition: border-color 0.15s, background 0.15s;
    }

    .field input:focus {
      background: rgba(255, 255, 255, 0.07);
      border-color: rgba(255, 255, 255, 0.3);
    }

    .btn-primary {
      display: block;
      width: 100%;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 8px;
      color: #fff;
      font-size: 0.95rem;
      padding: 12px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      margin-top: 10px;
      letter-spacing: 0.02em;
    }

    .btn-primary:hover:not(:disabled) {
      background: rgba(255, 255, 255, 0.14);
      border-color: rgba(255, 255, 255, 0.3);
    }

    .btn-primary:disabled {
      opacity: 0.28;
      cursor: default;
    }

    .error-box {
      background: rgba(255, 60, 60, 0.08);
      border: 1px solid rgba(255, 80, 80, 0.25);
      border-radius: 7px;
      color: #ff7070;
      font-size: 0.84rem;
      padding: 10px 13px;
      margin-bottom: 18px;
      line-height: 1.45;
    }

    .alt-link {
      display: block;
      text-align: center;
      font-size: 0.82rem;
      color: #555;
      margin-top: 22px;
    }

    .alt-link a {
      color: #888;
      text-decoration: none;
      transition: color 0.15s;
    }

    .alt-link a:hover { color: #ccc; }

    /* Language switcher */
    .lang-switcher {
      position: absolute;
      top: 14px;
      right: 16px;
    }

    .lang-switcher form {
      display: flex;
      gap: 4px;
    }

    .lang-switcher button {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1.2rem;
      padding: 2px;
      opacity: 0.4;
      transition: opacity 0.15s;
      line-height: 1;
    }

    .lang-switcher button:hover { opacity: 0.9; }
    .lang-switcher button.active { opacity: 1; }
  </style>
</head>
<body>
  <div class="card">
    <div class="lang-switcher">
      <form action="{% url 'set_language' %}" method="post">
        {% csrf_token %}
        <input type="hidden" name="next" value="{{ request.path }}">
        <button type="submit" name="language" value="ru"
                class="{% if LANGUAGE_CODE == 'ru' %}active{% endif %}"
                title="Русский">🇷🇺</button>
        <button type="submit" name="language" value="en"
                class="{% if LANGUAGE_CODE == 'en' %}active{% endif %}"
                title="English">🇬🇧</button>
      </form>
    </div>
    {% block content %}{% endblock %}
  </div>
</body>
</html>
