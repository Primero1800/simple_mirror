{% extends "accounts/base.html" %}
{% block title %}Восстановление пароля{% endblock %}

{% block content %}
<h1>Забыли пароль?</h1>
<p class="hint">Введите email — пришлём ссылку для сброса.</p>

<form method="post" novalidate>
  {% csrf_token %}
  <div class="field">
    <label>Email</label>
    <input type="email" name="email" autocomplete="email" autofocus required>
  </div>
  <button type="submit" class="btn-primary">Отправить ссылку</button>
</form>

<p class="alt-link"><a href="{% url 'accounts:login' %}">← Вернуться ко входу</a></p>
<p class="alt-link"><a href="{% url 'mirror:index' %}">Продолжить без входа →</a></p>
{% endblock %}
