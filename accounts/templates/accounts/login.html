{% extends "accounts/base.html" %}
{% block title %}Вход{% endblock %}

{% block content %}
<h1>Войти</h1>

{% if error %}
<div class="error-box">{{ error }}</div>
{% endif %}

<form method="post" novalidate>
  {% csrf_token %}
  <div class="field">
    <label>Email</label>
    <input type="email" name="email" autocomplete="email" autofocus required>
  </div>
  <div class="field">
    <label>Пароль</label>
    <input type="password" name="password" autocomplete="current-password" required>
  </div>
  <button type="submit" class="btn-primary">Продолжить →</button>
</form>

<p class="alt-link">Нет аккаунта? <a href="{% url 'accounts:register' %}">Зарегистрироваться</a></p>
<p class="alt-link"><a href="{% url 'accounts:password_reset' %}">Забыли пароль?</a></p>
<p class="alt-link"><a href="{% url 'mirror:index' %}">Продолжить без входа →</a></p>
{% endblock %}
