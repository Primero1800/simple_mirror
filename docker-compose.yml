services:

  db:
    image: postgres
    restart: unless-stopped
    env_file:
      - .env
    expose:
      - "${POSTGRES_PORT}"
    ports:
      - "${POSTGRES_PORT}:${POSTGRES_PORT}"
    volumes:
      - postgres_data:/var/lib/postgresql
    command: -p ${POSTGRES_PORT}
    networks:
      - mirror_network

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    expose:
      - "${REDIS_PORT}"
    ports:
      - "6380:${REDIS_PORT}"
    volumes:
      - redis_data:/data
    networks:
      - mirror_network

  web:
    restart: unless-stopped
    build:
      context: ./
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
      - redis
    command: ["sh", "-c", "python manage.py migrate --no-input && python manage.py runserver 0.0.0.0:8000"]
    networks:
      - mirror_network

volumes:
  postgres_data:
  redis_data:

networks:
  mirror_network:
